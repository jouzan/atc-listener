<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ATC Listener</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #fff;
    color: #000;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #111;
    color: #fff;
    padding: 10px 14px;
    padding-top: calc(10px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 16px; font-weight: 700; flex: 1; }
  .tabs { display: flex; gap: 6px; }
  .tab {
    background: #333; color: #ccc; border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .tab.active { background: #fff; color: #000; }

  #controls {
    padding: 12px 14px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #micBtn {
    border: none; border-radius: 999px; padding: 12px 26px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    background: #0a7d28; color: #fff;
  }
  #micBtn.listening { background: #c8102e; }
  #status { font-size: 13px; color: #666; }
  .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: #c8102e; margin-right: 6px; vertical-align: middle;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.2; } }

  #filePanel { display: none; }
  #filePanel input[type=file] { font-size: 14px; }
  #fileStatus { font-size: 13px; color: #666; }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 18px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    text-align: center;
  }
  #interim {
    color: #999; font-size: 22px; font-weight: 600; min-height: 30px;
    margin-bottom: 18px;
  }
  .instr {
    font-weight: 700;
    margin: 0 auto 26px;
    max-width: 640px;
    line-height: 1.35;
  }
  .instr.latest { font-size: 34px; }
  .instr:not(.latest) { font-size: 20px; color: #333; }
  .instr .time {
    display: block; font-size: 12px; font-weight: 400; color: #aaa; margin-top: 4px;
  }
  .hl { background: #fff3b0; padding: 0 3px; border-radius: 3px; }
  #empty { color: #bbb; font-size: 18px; font-weight: 600; margin-top: 60px; }
  #clearBtn {
    background: none; border: 1px solid #ccc; border-radius: 6px;
    padding: 6px 12px; font-size: 13px; color: #666; cursor: pointer;
    margin-left: auto;
  }
</style>
</head>
<body>
<header>
  <h1>ATC Listener</h1>
  <div class="tabs">
    <button class="tab active" id="tabLive">Live</button>
    <button class="tab" id="tabFile">Audio file</button>
  </div>
</header>

<div id="controls">
  <div id="livePanel" style="display:flex;align-items:center;gap:12px;flex:1;">
    <button id="micBtn">Start listening</button>
    <span id="status">Idle</span>
  </div>
  <div id="filePanel" style="align-items:center;gap:12px;flex:1;">
    <input type="file" id="fileInput" accept="audio/*,.m4a,.mp3,.wav,.aac,.ogg">
    <span id="fileStatus"></span>
  </div>
  <button id="clearBtn">Clear</button>
</div>

<main>
  <div id="interim"></div>
  <div id="feed"><div id="empty">Instructions will appear here</div></div>
</main>

<script type="module">
const feed = document.getElementById('feed');
const interimEl = document.getElementById('interim');
const statusEl = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const fileStatus = document.getElementById('fileStatus');

// ---------- shared: render instructions ----------
const KEYWORDS = /(hold short(?: of)?(?: runway)?(?: \S+)?|line up and wait|cleared (?:for takeoff|to land|for the option)|go around|cross runway \S+|contact \S+|expedite|give way|caution)/gi;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addInstruction(text) {
  text = text.trim();
  if (!text) return;
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  document.querySelectorAll('.instr.latest').forEach(e => e.classList.remove('latest'));
  const div = document.createElement('div');
  div.className = 'instr latest';
  const pretty = text.charAt(0).toUpperCase() + text.slice(1);
  const html = esc(pretty).replace(KEYWORDS, m => `<span class="hl">${m}</span>`);
  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  div.innerHTML = `${html}<span class="time">${t}</span>`;
  feed.prepend(div);
}

document.getElementById('clearBtn').onclick = () => {
  feed.innerHTML = '<div id="empty">Instructions will appear here</div>';
  interimEl.textContent = '';
};

// ---------- tabs ----------
const livePanel = document.getElementById('livePanel');
const filePanel = document.getElementById('filePanel');
const tabLive = document.getElementById('tabLive');
const tabFile = document.getElementById('tabFile');
tabLive.onclick = () => { tabLive.classList.add('active'); tabFile.classList.remove('active'); livePanel.style.display='flex'; filePanel.style.display='none'; };
tabFile.onclick = () => { tabFile.classList.add('active'); tabLive.classList.remove('active'); filePanel.style.display='flex'; livePanel.style.display='none'; };

// ---------- live mode: Web Speech API ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, wantListening = false;

if (!SR) {
  micBtn.disabled = true;
  statusEl.textContent = 'Speech recognition not supported in this browser. Use Chrome (Mac) or Safari (iPhone).';
}

function startRec() {
  rec = new SR();
  rec.lang = 'en-US';
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) addInstruction(r[0].transcript);
      else interim += r[0].transcript;
    }
    interimEl.textContent = interim;
  };
  rec.onend = () => {
    interimEl.textContent = '';
    if (wantListening) { try { rec.start(); } catch(_){} } // auto-restart
    else setListeningUI(false);
  };
  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      wantListening = false;
      setListeningUI(false);
      statusEl.textContent = 'Error [not-allowed]: mic blocked. Check browser site settings + iOS Settings > Apps > (browser) > Microphone.';
    } else if (e.error === 'service-not-allowed') {
      wantListening = false;
      setListeningUI(false);
      statusEl.textContent = 'Error [service-not-allowed]: speech service blocked. Enable Settings > General > Keyboard > Dictation (and Siri).';
    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
      statusEl.textContent = 'Error [' + e.error + ']';
    }
  };
  rec.start();
}

function setListeningUI(on) {
  listening = on;
  micBtn.textContent = on ? 'Stop' : 'Start listening';
  micBtn.classList.toggle('listening', on);
  statusEl.innerHTML = on ? '<span class="dot"></span>Listening…' : 'Idle';
}

micBtn.onclick = async () => {
  if (!SR) return;
  if (!listening) {
    // explicitly request the mic first — forces the permission prompt and
    // gives a clear error if it is blocked at browser or OS level
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
    } catch (err) {
      statusEl.textContent = 'Mic blocked [' + err.name + ']: allow the microphone in the browser site settings and in iOS Settings > Apps > (browser) > Microphone.';
      return;
    }
    wantListening = true;
    setListeningUI(true);
    startRec();
  } else {
    wantListening = false;
    rec && rec.stop();
    setListeningUI(false);
  }
};

// ---------- file mode: Whisper in-browser (transformers.js) ----------
let asr = null;
async function getASR() {
  if (asr) return asr;
  fileStatus.textContent = 'Loading speech model (~40 MB, first time only)…';
  const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
  env.allowLocalModels = false;
  asr = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en', {
    progress_callback: (p) => {
      if (p.status === 'progress' && p.total)
        fileStatus.textContent = `Loading model… ${Math.round(p.loaded/p.total*100)}%`;
    }
  });
  return asr;
}

document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const model = await getASR();
    fileStatus.textContent = 'Decoding audio…';
    const buf = await file.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const audio = await ctx.decodeAudioData(buf);
    let data = audio.getChannelData(0);
    if (audio.numberOfChannels > 1) { // mixdown
      const ch1 = audio.getChannelData(1);
      data = data.map((v, i) => (v + ch1[i]) / 2);
    }
    fileStatus.textContent = 'Transcribing…';
    const out = await model(data, { chunk_length_s: 30, stride_length_s: 5 });
    fileStatus.textContent = 'Done.';
    // split into sentences so each instruction shows separately
    const parts = out.text.split(/(?<=[.?!])\s+/).filter(s => s.trim());
    for (const p of parts) addInstruction(p.replace(/[.?!]+$/, ''));
  } catch (err) {
    fileStatus.textContent = 'Error: ' + err.message;
  }
  e.target.value = '';
};
</script>
</body>
</html>
